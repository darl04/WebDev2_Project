services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dramatique
    container_name: dramatique_container
    ports:
      - "8000:80"
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
      - ./public:/app/public
      - ./var:/app/var
    environment:
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}?serverVersion=8.0.32&charset=utf8mb4"
      APP_ENV: prod
      APP_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - platform-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: mysql:8.0
    container_name: dramatique_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - platform-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  platform-network:
    driver: bridge

volumes:
  db_data:
    driver: local